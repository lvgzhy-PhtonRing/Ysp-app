<script>
// ===== HOME / DATA INSIGHTS MODULE =====

function getMonthStats(now) {
  const y=now.getFullYear(), m=now.getMonth()+1;
  const items = APP.data.items.filter(i => {
    if (i.status!=='sold') return false;
    const d = i.saleDetails?.date||'';
    if (!d) return false;
    const dt=new Date(d);
    return dt.getFullYear()===y && dt.getMonth()+1===m;
  });
  return {
    revenue: items.reduce((s,i)=>s+toNum(i.saleDetails?.price),0),
    cost: items.reduce((s,i)=>s+toNum(i.cost),0),
    profit: items.reduce((s,i)=>s+toNum(i.saleDetails?.profit),0),
    count: items.length,
  };
}

function getLast3MonthsStats(now) {
  const result=[];
  for(let i=0;i<3;i++){
    const d=new Date(now.getFullYear(), now.getMonth()-i, 1);
    const year=d.getFullYear(), month=d.getMonth()+1;
    const items=APP.data.items.filter(it=>{
      if(it.status!=='sold') return false;
      const sd=it.saleDetails?.date;
      if(!sd) return false;
      const dt=new Date(sd);
      return dt.getFullYear()===year && dt.getMonth()+1===month;
    });
    const revenue=items.reduce((s,it)=>s+toNum(it.saleDetails?.price),0);
    const cost=items.reduce((s,it)=>s+toNum(it.cost),0);
    const profit=items.reduce((s,it)=>s+toNum(it.saleDetails?.profit),0);
    result.push({year,month,count:items.length,revenue,cost,profit});
  }
  return result;
}

function getPurchaseStatus() {
  const items=APP.data.items.filter(i=>i.status==='purchase');
  const inProgressAmount=items.reduce((s,i)=>s+toNum(i.cost),0);
  const purchaseAmount=items.reduce((s,i)=>s+toNum(i.purchaseDetails?.preTransferCost),0);
  const transferAmount=items.reduce((s,i)=>s+toNum(i.purchaseDetails?.transferCost),0);
  const pendingCount=items.filter(i=>(i.purchaseDetails?.transferStatus||'pending')==='pending').length;
  return {count:items.length,inProgressAmount,purchaseAmount,transferAmount,pendingCount,totalCost:inProgressAmount};
}

function getBatchReturnStats() {
  const items=APP.data.items;
  const batchMap={};
  const categoryMap={
    '2025JAPAN':{category:'2025JAPAN',totalCost:0,revenue:0},
    '美淘':{category:'美淘',totalCost:0,revenue:0},
    '日淘':{category:'日淘',totalCost:0,revenue:0},
    '国内':{category:'国内',totalCost:0,revenue:0},
  };
  const catOrder={'2025JAPAN':1,'美淘':2,'日淘':3,'国内':4};
  const batchOrderMap={
    '美淘':{'A组上半年':1,'A组下半年':2,'B组下半年':3,'26上半年':4},
    '日淘':{'a批':1,'b批':2,'d批':3,'预订':4,'预订批':4,'26d批':5,'26e批':6,'26f批':7},
  };

  const allCostMap={}, allCatCostMap={};
  items.forEach(item=>{
    const key=`${item.category}|${item.batch}`;
    allCostMap[key]=(allCostMap[key]||0)+toNum(item.cost);
    allCatCostMap[item.category]=(allCatCostMap[item.category]||0)+toNum(item.cost);
    if(!batchMap[key]) batchMap[key]={category:item.category,batch:item.batch,totalCost:0,revenue:0};
  });

  const saleGroups={};
  items.forEach(item=>{
    if(item.status!=='sold') return;
    const gk=`${item.sid||''}|${item.saleDetails?.date||''}`;
    if(!saleGroups[gk]) saleGroups[gk]={sid:item.sid,category:item.category,batch:item.batch,
      price:toNum(item.totalPrice||item.saleDetails?.price)};
  });

  Object.values(saleGroups).forEach(sale=>{
    const key=`${sale.category}|${sale.batch}`;
    if(!batchMap[key]) batchMap[key]={category:sale.category,batch:sale.batch,totalCost:0,revenue:0};
    batchMap[key].revenue+=sale.price;
    if(categoryMap[sale.category]) categoryMap[sale.category].revenue+=sale.price;
  });

  Object.keys(batchMap).forEach(k=>{ batchMap[k].totalCost=allCostMap[k]||0; });
  Object.keys(categoryMap).forEach(c=>{ categoryMap[c].totalCost=allCatCostMap[c]||0; });

  const catResults=Object.values(categoryMap)
    .map(c=>({...c,batch:'',isCategory:true,rate:c.totalCost>0?(c.revenue/c.totalCost)*100:0}))
    .filter(c=>c.totalCost>0)
    .sort((a,b)=>(catOrder[a.category]||99)-(catOrder[b.category]||99));

  const batchResults=Object.values(batchMap)
    .map(b=>({...b,rate:b.totalCost>0?(b.revenue/b.totalCost)*100:0}))
    .sort((a,b)=>{
      const co=(catOrder[a.category]||99)-(catOrder[b.category]||99);
      if(co!==0) return co;
      const bo=(batchOrderMap[a.category]?.[a.batch]||99)-(batchOrderMap[b.category]?.[b.batch]||99);
      return bo;
    });

  const result=[];
  catResults.forEach(cat=>{
    result.push(cat);
    result.push(...batchResults.filter(b=>b.category===cat.category));
  });

  let allTotalCost=0, allRevenue=0;
  Object.values(allCostMap).forEach(v=>{ allTotalCost+=v; });
  Object.values(batchMap).forEach(b=>{ allRevenue+=b.revenue; });
  result.push({category:'汇总',batch:'',totalCost:allTotalCost,revenue:allRevenue,
    rate:allTotalCost>0?(allRevenue/allTotalCost)*100:0,isCategory:false,isSummary:true});
  return result;
}

// Search (full logic from useHomeInsights.js)
function normalizeText(v='') {
  return String(v||'').toLowerCase().replace(/\s+/g,'').replace(/[\-_/.,，。；;:：()（）\[\]【】]/g,'');
}
function isSubsequence(query='',target='') {
  if(!query||!target) return false;
  let qi=0;
  for(let i=0;i<target.length&&qi<query.length;i++) if(target[i]===query[qi]) qi++;
  return qi===query.length;
}
function statusKeywords(status='') {
  if(status==='sold') return ['sold','已售'];
  if(status==='inventory') return ['inventory','库存','在库'];
  if(status==='purchase') return ['purchase','采购','采购中'];
  return [String(status||'')];
}
function itemSearchText(item={}) {
  const p=item.purchaseDetails||{};
  return [item.sid,item.name,item.brand,item.category,item.batch,
    p.website,p.websiteAccount,p.paymentAccount,p.paymentBatch,...statusKeywords(item.status)]
    .filter(Boolean).join(' ');
}

function searchItems(keyword='') {
  const raw=String(keyword||'').trim().toLowerCase();
  if(!raw) return [];
  const normKw=normalizeText(raw);
  const tokens=raw.split(/\s+/).filter(Boolean);
  const normTokens=tokens.map(t=>normalizeText(t)).filter(Boolean);

  const scored=APP.data.items.map(item=>{
    const sid=String(item.sid||'').toLowerCase();
    const name=String(item.name||'').toLowerCase();
    const brand=String(item.brand||'').toLowerCase();
    const text=itemSearchText(item).toLowerCase();
    const sidN=normalizeText(sid), nameN=normalizeText(name), brandN=normalizeText(brand), textN=normalizeText(text);
    let score=0; const reasons=new Set();

    if(sid===raw){score+=300;reasons.add('SID精确');}
    if(sidN===normKw){score+=260;reasons.add('SID标准化');}
    if(name===raw){score+=220;reasons.add('名称精确');}
    if(nameN===normKw){score+=180;reasons.add('名称标准化');}
    if(brand===raw){score+=140;reasons.add('品牌精确');}
    if(sid.includes(raw)){score+=160;reasons.add('SID命中');}
    if(name.includes(raw)){score+=120;reasons.add('名称命中');}
    if(brand.includes(raw)){score+=90;reasons.add('品牌命中');}
    if(text.includes(raw)){score+=50;reasons.add('综合字段命中');}
    if(sidN.includes(normKw)){score+=120;reasons.add('SID模糊');}
    if(nameN.includes(normKw)){score+=80;reasons.add('名称模糊');}
    if(textN.includes(normKw)){score+=40;reasons.add('字段模糊');}
    if(isSubsequence(normKw,sidN)){score+=70;reasons.add('SID联想');}
    if(isSubsequence(normKw,nameN)){score+=50;reasons.add('名称联想');}
    const tokenHits=normTokens.reduce((h,t)=>textN.includes(t)||isSubsequence(t,textN)?h+1:h,0);
    if(normTokens.length>1&&tokenHits>0){score+=tokenHits*25;reasons.add('多词命中');}
    if(normTokens.length>1&&tokenHits===normTokens.length){score+=60;reasons.add('多词全中');}

    return {item,score,reasons:Array.from(reasons)};
  }).filter(x=>x.score>0).sort((a,b)=>b.score-a.score);

  const mergedMap=new Map(), mergedList=[];
  function mergeKeyOf(item={}) {
    const status=String(item.status||'');
    if(!['purchase','inventory'].includes(status)) return null;
    const p=item.purchaseDetails||{};
    const cost=Number(item.cost||0), tc=Number(p.transferCost||0);
    return [String(item.sid||''),status,cost.toFixed(4),String(p.transferStatus||''),
      String(p.transferBatch||''),tc.toFixed(4)].join('|');
  }

  scored.forEach(({item,score,reasons})=>{
    const key=mergeKeyOf(item);
    const rSet=new Set(reasons||[]);
    if(!key){
      mergedList.push({...item,_isMerged:false,_groupCount:1,_groupTotalCost:Number(item.cost||0),
        _groupItems:[item],_searchMatchTypes:Array.from(rSet).slice(0,3)});
      return;
    }
    const existing=mergedMap.get(key);
    if(!existing){
      const rec={...item,_isMerged:true,_groupCount:1,_groupTotalCost:Number(item.cost||0),
        _groupItems:[item],_searchScore:score,_reasonSet:rSet};
      mergedMap.set(key,rec); mergedList.push(rec); return;
    }
    existing._groupCount++;
    existing._groupTotalCost+=Number(item.cost||0);
    existing._groupItems.push(item);
    if(score>Number(existing._searchScore||0)) existing._searchScore=score;
    rSet.forEach(r=>existing._reasonSet.add(r));
  });

  return mergedList.sort((a,b)=>Number(b._searchScore||0)-Number(a._searchScore||0))
    .map(x=>({...x,_searchMatchTypes:Array.from(x._reasonSet||x._searchMatchTypes||[]).slice(0,3),
      _groupTotalCost:Number(x._groupTotalCost||0),_searchScore:undefined,_reasonSet:undefined}));
}

function statusText(s) {
  if(s==='inventory') return '库存';
  if(s==='sold') return '已售';
  if(s==='purchase') return '采购中';
  return s||'-';
}

function calcAlipayBalance() {
  const inv=APP.data.items.filter(i=>i.status==='inventory');
  const invValue=inv.reduce((s,i)=>s+toNum(i.cost),0);
  const sold=APP.data.items.filter(i=>i.status==='sold');
  const totalActualProfit=sold.reduce((s,i)=>s+toNum(i.saleDetails?.profit),0);
  const financeLoanBalance=APP.data.finance.loans.reduce((sum,l)=>{
    if(l.type==='borrow') return sum+toNum(l.amount);
    if(l.type==='lend') return sum-toNum(l.amount); // lend=还款/归还
    return sum;
  },0);
  const financePublicExpense=APP.data.finance.records
    .filter(r=>r.type==='expense').reduce((s,r)=>s+toNum(r.amount),0);
  const paytonYeb=toNum(APP.data.payton.accounts.yeb?.balance);
  const purchaseTotalCost=APP.data.items.filter(i=>i.status==='purchase').reduce((s,i)=>s+toNum(i.cost),0);

  return toNum(APP.calc.debt)
    + financeLoanBalance
    + totalActualProfit
    - invValue
    - financePublicExpense
    - toNum(APP.calc.unconfirmed)
    + paytonYeb
    - purchaseTotalCost;
}

function renderHome() {
  const now = new Date();
  document.getElementById('home-date').textContent = now.toISOString().slice(0,10);

  const monthStats = getMonthStats(now);
  const last3 = getLast3MonthsStats(now);
  const purStats = getPurchaseStatus();
  const inv = APP.data.items.filter(i=>i.status==='inventory');
  const invValue = inv.reduce((s,i)=>s+toNum(i.cost),0);
  const invCount = inv.length;
  const lt = inv.filter(i=>i.isLongTerm===true);
  const ltValue = lt.reduce((s,i)=>s+toNum(i.cost),0);
  const ltCount = lt.length;
  const sold = APP.data.items.filter(i=>i.status==='sold');
  const totalActualProfit = sold.reduce((s,i)=>s+toNum(i.saleDetails?.profit),0);
  const soldCost = sold.reduce((s,i)=>s+toNum(i.cost),0);
  const totalProfitMargin = soldCost>0 ? totalActualProfit/soldCost : 0;

  let html = '';

  // Month stats
  html += `<div class="card" style="margin-top:10px">
    <div class="card-header"><div class="card-title">本月数据 (${now.getFullYear()}/${now.getMonth()+1})</div></div>
    <div class="card-body">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div style="background:#f0f6ff;border-radius:10px;padding:10px;border-left:4px solid #007aff">
          <div style="font-size:11px;color:#8e8e93">月销售额</div>
          <div style="font-size:22px;font-weight:700;color:#1c1c1e">¥${fmtMoney(monthStats.revenue)}</div>
        </div>
        <div style="background:#fff9f0;border-radius:10px;padding:10px;border-left:4px solid #ff9500">
          <div style="font-size:11px;color:#8e8e93">对应成本</div>
          <div style="font-size:22px;font-weight:700;color:#1c1c1e">¥${fmtMoney(monthStats.cost)}</div>
        </div>
      </div>
      <div style="background:#f9f9f9;border-radius:10px;padding:10px;margin-top:10px;border-left:4px solid #8e8e93">
        <div style="font-size:11px;color:#8e8e93">月利润 (${monthStats.count}件)</div>
        <div style="font-size:26px;font-weight:800;${monthStats.profit>=0?'color:#34c759':'color:#ff3b30'}">${fmtMoney(monthStats.profit)}</div>
      </div>
    </div>
  </div>`;

  // Last 3 months
  html += `<div class="card" style="margin-top:10px">
    <div class="card-header"><div class="card-title">近三个月销售</div></div>
    <div class="table-scroll">
      <table class="data-table">
        <thead><tr><th>月份</th><th class="right">件数</th><th class="right">回款</th><th class="right">成本</th><th class="right">利润</th><th class="right">利润率</th></tr></thead>
        <tbody>`;
  last3.forEach(m => {
    const rate = m.cost>0 ? (m.profit/m.cost*100) : 0;
    html += `<tr>
      <td>${m.year}/${m.month}</td>
      <td class="right">${m.count}</td>
      <td class="right">¥${fmtMoney(m.revenue)}</td>
      <td class="right">¥${fmtMoney(m.cost)}</td>
      <td class="right ${profitClass(m.profit)}">${fmtMoney(m.profit)}</td>
      <td class="right">${m.cost>0?fmt(rate,1)+'%':'-'}</td>
    </tr>`;
  });
  html += `</tbody></table></div></div>`;

  // Purchase status
  html += `<div class="card" style="margin-top:10px;background:linear-gradient(135deg,#fff9f0,#fff)">
    <div class="card-body">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div>
          <div style="font-size:32px;font-weight:800;color:#ff9500">¥${fmtMoney(purStats.inProgressAmount)}</div>
          <div style="font-size:12px;color:#ff9500;margin-top:2px">采购中金额（含转运费）</div>
        </div>
        <div style="display:flex;gap:16px">
          <div style="text-align:center">
            <div style="font-size:24px;font-weight:700;color:#ff9500">${purStats.count}</div>
            <div style="font-size:11px;color:#8e8e93">采购中(件)</div>
          </div>
          <div style="text-align:center">
            <div style="font-size:24px;font-weight:700;color:#1c1c1e">${purStats.pendingCount}</div>
            <div style="font-size:11px;color:#8e8e93">待转运(件)</div>
          </div>
        </div>
      </div>
      <div style="display:flex;gap:16px;margin-top:8px;font-size:12px;color:#8e8e93">
        <span>累计采购 <b style="color:#ff9500">¥${fmtMoney(purStats.purchaseAmount)}</b></span>
        <span>累计转运 <b style="color:#5ac8fa">¥${fmtMoney(purStats.transferAmount)}</b></span>
      </div>
    </div>
  </div>`;

  // Inventory & profit overview
  html += `<div class="card" style="margin-top:10px">
    <div class="card-body" style="padding:12px">
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">
        <div style="background:#fff;border-radius:10px;padding:10px;text-align:center;border:1px solid #e5e5ea">
          <div style="font-size:11px;color:#8e8e93">库存总货值</div>
          <div style="font-size:20px;font-weight:800;color:#007aff">¥${fmtMoney(invValue)}</div>
          <div style="font-size:11px;color:#8e8e93">${invCount}件</div>
        </div>
        <div style="background:#fff;border-radius:10px;padding:10px;text-align:center;border:1px solid #e5e5ea">
          <div style="font-size:11px;color:#8e8e93">短线货值</div>
          <div style="font-size:20px;font-weight:800;color:#af52de">¥${fmtMoney(invValue-ltValue)}</div>
          <div style="font-size:11px;color:#8e8e93">${invCount-ltCount}件</div>
        </div>
        <div style="background:#fff;border-radius:10px;padding:10px;text-align:center;border:1px solid #e5e5ea">
          <div style="font-size:11px;color:#8e8e93">总实盈利润</div>
          <div style="font-size:20px;font-weight:800;${totalActualProfit>=0?'color:#34c759':'color:#ff3b30'}">¥${fmtMoney(totalActualProfit)}</div>
          <div style="font-size:11px;color:#8e8e93">率${fmt(totalProfitMargin*100,1)}%</div>
        </div>
      </div>
    </div>
  </div>`;

  // Alipay calculator
  const alipay = calcAlipayBalance();
  html += `<div class="card" style="margin-top:10px">
    <div class="card-header">
      <div class="card-title">💙 支付宝余额计算器</div>
    </div>
    <div class="card-body">
      <div class="calc-grid">
        <div class="calc-item">
          <label>挖财总负债</label>
          <input type="number" id="calc-debt" value="${APP.calc.debt}" oninput="updateCalc('debt',this.value)">
        </div>
        <div class="calc-item">
          <label>借贷余额（自动）</label>
          <div style="font-size:16px;font-weight:600;padding-top:4px">${fmtMoney(APP.data.finance.loans.reduce((sum,l)=>{
            if(l.type==='borrow') return sum+toNum(l.amount);
            if(l.type==='lend') return sum-toNum(l.amount); // lend=还款/归还
            return sum;
          },0))}</div>
        </div>
        <div class="calc-item">
          <label>公共支出（自动）</label>
          <div style="font-size:16px;font-weight:600;padding-top:4px">${fmtMoney(APP.data.finance.records.filter(r=>r.type==='expense').reduce((s,r)=>s+toNum(r.amount),0))}</div>
        </div>
        <div class="calc-item">
          <label>未确认交易</label>
          <input type="number" id="calc-unconfirmed" value="${APP.calc.unconfirmed}" oninput="updateCalc('unconfirmed',this.value)">
        </div>
        <div class="calc-item">
          <label>Payton余额宝（自动）</label>
          <div style="font-size:16px;font-weight:600;padding-top:4px">${fmtMoney(toNum(APP.data.payton.accounts.yeb?.balance))}</div>
        </div>
      </div>
      <div class="calc-result">
        <div class="calc-result-label">应有支付宝余额</div>
        <div class="calc-result-val" id="alipay-result">¥${fmtMoney(alipay)}</div>
      </div>
    </div>
  </div>`;

  // Search
  html += `<div class="card" style="margin-top:10px">
    <div class="card-header"><div class="card-title">🔍 商品查询器</div></div>
    <div class="card-body" style="padding:10px 14px">
      <input class="search-input" type="text" placeholder="输入SID/名称/品牌搜索" value="${esc(APP.searchKeyword)}"
        oninput="updateSearch(this.value)">
      <div id="search-results" style="margin-top:8px"></div>
    </div>
  </div>`;

  // Batch return stats
  const batchStats = getBatchReturnStats();
  html += `<div class="card" style="margin-top:10px">
    <div class="card-header" style="cursor:pointer" onclick="toggleBatchStats()">
      <div class="card-title">📈 批次回款统计</div>
      <span class="chevron ${!APP.batchStatsCollapsed?'open':''}">▶</span>
    </div>`;
  if (!APP.batchStatsCollapsed) {
    html += `<div class="table-scroll">
      <table class="data-table">
        <thead><tr><th>分类</th><th>批次</th><th class="right">总成本</th><th class="right">回款</th><th class="right">回款率</th></tr></thead>
        <tbody>`;
    batchStats.forEach(row => {
      const rateClass = row.rate>=100?'rate-high':row.rate>=50?'rate-mid':'rate-low';
      const rowClass = row.isSummary?'summary-row':row.isCategory?'category-row':'';
      html += `<tr class="${rowClass}">
        <td>${esc(row.category)}</td>
        <td>${esc(row.batch||'')}</td>
        <td class="right">¥${fmtMoney(row.totalCost)}</td>
        <td class="right">¥${fmtMoney(row.revenue)}</td>
        <td class="right ${rateClass}">${fmt(row.rate,2)}%</td>
      </tr>`;
    });
    html += `</tbody></table></div>`;
  }
  html += `</div>`;

  document.getElementById('home-content').innerHTML = html;

  // render search if keyword exists
  if (APP.searchKeyword) renderSearchResults();
}

function updateCalc(field, val) {
  APP.calc[field] = toNum(val);
  const alipay = calcAlipayBalance();
  const el = document.getElementById('alipay-result');
  if (el) el.textContent = '¥' + fmtMoney(alipay);
}

function updateSearch(kw) {
  APP.searchKeyword = kw;
  renderSearchResults();
}

function renderSearchResults() {
  const el = document.getElementById('search-results');
  if (!el) return;
  if (!APP.searchKeyword) { el.innerHTML = ''; return; }
  const results = searchItems(APP.searchKeyword);
  const totalCount = results.reduce((s,i)=>s+Number(i._groupCount||1),0);
  if (results.length === 0) { el.innerHTML = '<div style="color:#8e8e93;font-size:13px;padding:8px 0">无匹配结果</div>'; return; }

  let html = `<div style="font-size:12px;color:#8e8e93;margin-bottom:6px">找到 ${totalCount} 条（合并后 ${results.length} 组）</div>`;
  results.forEach(item => {
    const statusLabel = statusText(item.status);
    const statusColor = item.status==='sold'?'#007aff':item.status==='inventory'?'#34c759':'#ff9500';
    html += `<div class="search-result-item" onclick="showSearchDetail(${JSON.stringify(item.id)})">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div style="flex:1;min-width:0">
          <div style="font-size:14px;font-weight:500">${esc(item.name)}</div>
          <div style="font-size:11px;color:#8e8e93">${esc(item.sid||'')} · ${esc(item.brand||'')} · <span style="color:${statusColor}">${statusLabel}</span></div>
          ${item._groupCount>1?`<div style="font-size:11px;color:#8e8e93">×${item._groupCount}件 合计¥${fmtMoney(item._groupTotalCost)}</div>`:''}
        </div>
        <div style="text-align:right;flex-shrink:0">
          <div style="font-size:14px;font-weight:600">¥${fmtMoney(item.cost)}</div>
        </div>
      </div>
      <div class="search-match-tags">
        ${(item._searchMatchTypes||[]).map(t=>`<span class="match-tag">${esc(t)}</span>`).join('')}
      </div>
    </div>`;
  });
  el.innerHTML = html;
}

// 通用商品详情弹窗 - 支持从任意页面调用
function openItemDetail(itemId) {
  // 先从搜索结果中找（支持合并组），再从原始数据中找
  let item = null;
  let groupItems = null;

  if (APP.searchKeyword) {
    const results = searchItems(APP.searchKeyword);
    const found = results.find(i => i.id === itemId || (i._isMerged && i._groupItems && i._groupItems.some(gi => gi.id === itemId)));
    if (found) {
      item = found._isMerged ? found._groupItems[0] : found;
      groupItems = found._isMerged ? found._groupItems : null;
    }
  }
  if (!item) {
    item = APP.data.items.find(i => i.id === itemId);
  }
  if (!item) return;

  const displayItems = groupItems || [item];
  const isMerged = groupItems && groupItems.length > 1;

  let html = `<div style="margin-bottom:12px">
    <div style="font-size:17px;font-weight:700">${esc(item.name)}</div>
    <div style="font-size:12px;color:#8e8e93;margin-top:3px">${esc(item.sid||'')} · ${esc(item.brand||'')} · ${esc(item.category||'')} · ${esc(item.batch||'')}</div>
    <div style="margin-top:6px;display:flex;gap:6px;flex-wrap:wrap">`;
  if (item.isLongTerm) html += `<span class="tag longterm">长线</span>`;
  if (item.isDefect) html += `<span class="tag defect">残次</span>`;
  html += `</div></div>`;

  // 合并组信息
  if (isMerged) {
    html += `<div style="background:#eef2ff;border-radius:10px;padding:10px;margin-bottom:10px;border:1px solid #c7d2fe">
      <div style="font-size:12px;font-weight:600;color:#4f46e5;margin-bottom:6px">合并组信息 · 共 ${displayItems.length} 条 · 合计¥${fmtMoney(displayItems.reduce((s,i)=>s+toNum(i.cost),0))}</div>`;
    displayItems.forEach((gi, gidx) => {
      html += `<div style="font-size:11px;color:#6b7280;padding:3px 0;border-bottom:1px solid #e0e7ff">#${gidx+1} · ID:${gi.id} · 成本¥${fmtMoney(gi.cost)} · 转运批次:${gi.purchaseDetails?.transferBatch||'-'}</div>`;
    });
    html += `</div>`;
  }

  displayItems.forEach((it, idx) => {
    const pd = it.purchaseDetails || {};
    const sd = it.saleDetails || {};
    html += `<div style="background:#f9f9f9;border-radius:10px;padding:10px;margin-bottom:8px">`;
    if (isMerged) html += `<div style="font-size:12px;font-weight:600;color:#8e8e93;margin-bottom:6px">记录 ${idx+1} · ${statusText(it.status)}</div>`;
    else html += `<div style="font-size:12px;font-weight:600;color:#8e8e93;margin-bottom:6px">${statusText(it.status)}</div>`;
    html += `<div class="label-val"><span class="label">成本</span><span class="val">¥${fmtMoney(it.cost)}</span></div>`;

    // 销售信息
    if (it.status === 'sold' && sd) {
      html += `<div style="background:#f0fdf4;border-radius:8px;padding:8px;margin-top:6px;border:1px solid #bbf7d0">
        <div style="font-size:11px;font-weight:600;color:#16a34a;margin-bottom:4px">销售信息</div>`;
      if (sd.date) html += `<div class="label-val"><span class="label">销售日期</span><span class="val">${esc(sd.date)}</span></div>`;
      html += `<div class="label-val"><span class="label">售价</span><span class="val">¥${fmtMoney(sd.price)}</span></div>`;
      if (toNum(sd.express) > 0) html += `<div class="label-val"><span class="label">运费</span><span class="val">¥${fmtMoney(sd.express)}</span></div>`;
      if (toNum(sd.feeRate) > 0) html += `<div class="label-val"><span class="label">费率</span><span class="val">${fmt(toNum(sd.feeRate)*100,1)}%</span></div>`;
      if (toNum(sd.deduction) > 0) html += `<div class="label-val"><span class="label">扣款</span><span class="val">¥${fmtMoney(sd.deduction)}</span></div>`;
      html += `<div class="label-val"><span class="label">利润</span><span class="val ${profitClass(sd.profit)}">${fmtProfit(sd.profit)}</span></div>`;
      html += `</div>`;
    }

    // 采购信息
    if (pd && (pd.date || pd.website || pd.originalPrice || pd.preTransferCost)) {
      html += `<div style="background:#eff6ff;border-radius:8px;padding:8px;margin-top:6px;border:1px solid #bfdbfe">
        <div style="font-size:11px;font-weight:600;color:#1d4ed8;margin-bottom:4px">采购信息</div>`;
      if (pd.date) html += `<div class="label-val"><span class="label">采购日期</span><span class="val">${esc(pd.date)}</span></div>`;
      if (pd.website) html += `<div class="label-val"><span class="label">官网</span><span class="val">${esc(pd.website)}</span></div>`;
      if (pd.websiteAccount) html += `<div class="label-val"><span class="label">官网账号</span><span class="val">${esc(pd.websiteAccount)}</span></div>`;
      if (pd.originalPrice) html += `<div class="label-val"><span class="label">官网原价</span><span class="val">${fmtMoney(pd.originalPrice)}</span></div>`;
      if (pd.domesticShipping) html += `<div class="label-val"><span class="label">国内运费</span><span class="val">¥${fmtMoney(pd.domesticShipping)}</span></div>`;
      if (pd.fee) html += `<div class="label-val"><span class="label">手续费</span><span class="val">¥${fmtMoney(pd.fee)}</span></div>`;
      if (pd.exchangeRate) html += `<div class="label-val"><span class="label">汇率</span><span class="val">${Number(pd.exchangeRate).toFixed(4)}</span></div>`;
      if (pd.preTransferCost) html += `<div class="label-val"><span class="label">转运前成本</span><span class="val">¥${fmtMoney(pd.preTransferCost)}</span></div>`;
      if (toNum(pd.transferCost) > 0) html += `<div class="label-val"><span class="label">转运费</span><span class="val">¥${fmtMoney(pd.transferCost)}</span></div>`;
      if (pd.transferBatch) html += `<div class="label-val"><span class="label">转运批次</span><span class="val">${esc(pd.transferBatch)}</span></div>`;
      if (pd.transferStatus) html += `<div class="label-val"><span class="label">转运状态</span><span class="val">${pd.transferStatus==='pending'?'待转运':'已转运'}</span></div>`;
      if (pd.totalRMB) html += `<div class="label-val"><span class="label">总人民币</span><span class="val" style="color:#ea580c;font-weight:700">¥${fmtMoney(pd.totalRMB)}</span></div>`;
      if (pd.paymentAccount) html += `<div class="label-val"><span class="label">付款账号</span><span class="val">${esc(pd.paymentAccount)}</span></div>`;
      if (pd.paymentBatch) html += `<div class="label-val"><span class="label">付款批次</span><span class="val">${esc(pd.paymentBatch)}</span></div>`;
      if (pd.discount) html += `<div class="label-val"><span class="label">折扣</span><span class="val">${esc(pd.discount)}</span></div>`;
      html += `</div>`;
    }

    html += `</div>`;
  });

  document.getElementById('detail-modal-body').innerHTML = html;
  document.getElementById('detail-modal').classList.add('open');
}

// 保持向后兼容
function showSearchDetail(itemId) { openItemDetail(itemId); }

function toggleBatchStats() {
  APP.batchStatsCollapsed = !APP.batchStatsCollapsed;
  renderHome();
}
</script>

<!-- Detail Modal -->
<div class="modal-overlay" id="detail-modal" onclick="if(event.target===this)closeDetailModal()">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <button class="modal-close" onclick="closeDetailModal()">×</button>
      <div class="modal-title">商品详情</div>
    </div>
    <div class="modal-body" id="detail-modal-body"></div>
  </div>
</div>
<script>
function closeDetailModal() {
  document.getElementById('detail-modal').classList.remove('open');
}
</script>

</body>
</html>
